<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Madey Design — Coming Soon</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="description" content="Madey Design — handcrafted woodwork. Something beautiful is on its way." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f7f3ee;
      color: #1e160f;
      font-family: 'Inter', sans-serif;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      -webkit-font-smoothing: antialiased;
    }

    .logo {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 2.2rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      margin-bottom: 48px;
      color: #1e160f;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: #c9b99a;
      margin: 0 auto 48px;
    }

    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 300;
      line-height: 1.15;
      margin-bottom: 24px;
      color: #1e160f;
    }
    h1 em { font-style: italic; }

    p {
      font-size: 14px;
      line-height: 1.75;
      color: #7a5c3e;
      max-width: 340px;
      margin: 0 auto 48px;
    }

    .ig-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      letter-spacing: 0.12em;
      color: #1e160f;
      text-decoration: none;
      border-bottom: 1px solid #c9b99a;
      padding-bottom: 3px;
      transition: border-color 200ms ease;
    }
    .ig-link:hover { border-color: #1e160f; }

    footer {
      position: fixed;
      bottom: 24px;
      font-size: 11px;
      color: #c9b99a;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>

  <div class="logo">madey</div>
  <div class="divider"></div>

  <h1>Something beautiful<br/><em>is on its way.</em></h1>
  <p>Handcrafted woodwork made in small batches. Check back soon — or follow along in the meantime.</p>

  <a href="https://www.instagram.com/madeydesign" target="_blank" rel="noopener" class="ig-link">
    @madeydesign ↗
  </a>

  <footer>madey.com</footer>

</body>
</html>
