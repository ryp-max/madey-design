<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product — Madey Design</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #f7f3ee;
      --parchment: #ede8df;
      --bark: #7a5c3e;
      --wood: #4a2e14;
      --ink: #1e160f;
      --warm: #c9b99a;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--cream); color: var(--ink); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
    a { color: inherit; text-decoration: none; }

    /* NAV */
    .nav {
      position: sticky; top: 0; z-index: 50;
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 40px;
      background: rgba(247,243,238,0.95);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid #ede8df;
    }
    .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 300; letter-spacing: 0.06em; }
    .nav-links { list-style: none; display: flex; gap: 32px; }
    .nav-links a { font-size: 12px; letter-spacing: 0.1em; opacity: 0.55; transition: opacity 200ms; }
    .nav-links a:hover, .nav-links a.active { opacity: 1; }
    .nav-hamburger { display: none; flex-direction: column; gap: 6px; background: none; border: none; cursor: pointer; }
    .nav-hamburger span { display: block; width: 20px; height: 1px; background: var(--ink); }

    /* MOBILE MENU */
    .mobile-menu { position: fixed; inset: 0; z-index: 200; background: var(--cream); display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .mobile-menu[hidden] { display: none; }
    .mobile-menu ul { list-style: none; text-align: center; }
    .mobile-menu li { margin: 20px 0; }
    .mobile-menu a { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 300; }
    .mobile-menu-close { position: absolute; top: 24px; right: 28px; background: none; border: none; font-size: 18px; cursor: pointer; opacity: 0.5; }

    /* PRODUCT DETAIL LAYOUT */
    .product-detail {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: calc(100vh - 66px);
    }

    /* LEFT: sticky image */
    .product-left {
      position: sticky;
      top: 66px;
      height: calc(100vh - 66px);
      overflow: hidden;
      background: var(--parchment);
      align-self: start;
    }
    .product-left img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    /* RIGHT: centered label panel */
    .product-right {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(48px, 8vw, 96px) clamp(40px, 7vw, 88px);
      border-left: 1px solid var(--parchment);
    }

    .product-panel {
      display: flex;
      flex-direction: column;
      gap: 22px;
      max-width: 420px;
      width: 100%;
    }

    .product-category {
      display: block;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-variant: small-caps;
      color: var(--bark);
    }

    .product-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 3.5vw, 3rem);
      font-weight: 300;
      line-height: 1.1;
    }

    .product-sold-badge {
      display: inline-block;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-variant: small-caps;
      color: var(--bark);
      opacity: 0.65;
      border: 1px solid var(--warm);
      padding: 3px 10px 2px;
      align-self: flex-start;
    }

    .product-desc {
      font-size: 15px;
      line-height: 1.85;
      color: var(--ink);
      opacity: 0.78;
    }

    .product-divider {
      width: 32px;
      height: 1px;
      background: var(--warm);
    }

    .inquire-link {
      font-size: 13px;
      letter-spacing: 0.06em;
      color: var(--ink);
      border-bottom: 1px solid var(--ink);
      padding-bottom: 2px;
      align-self: flex-start;
      transition: opacity 200ms;
    }
    .inquire-link:hover { opacity: 0.5; }

    .back-link {
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--bark);
      transition: opacity 200ms;
      margin-top: -4px;
    }
    .back-link:hover { opacity: 0.6; }

    /* FOOTER */
    .footer { background: var(--ink); color: rgba(253,250,247,0.5); padding: 28px 40px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .footer .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; color: #fdfaf7; font-weight: 300; letter-spacing: 0.06em; }
    .footer p { font-size: 11px; }
    .footer a { font-size: 11px; letter-spacing: 0.08em; transition: color 200ms; }
    .footer a:hover { color: #fdfaf7; }

    /* MOBILE */
    @media (max-width: 768px) {
      .nav { padding: 18px 20px; }
      .nav-links { display: none; }
      .nav-hamburger { display: flex; }

      .product-detail {
        grid-template-columns: 1fr;
        min-height: auto;
      }
      .product-left {
        position: relative;
        top: auto;
        height: auto;
        aspect-ratio: 4/3;
      }
      .product-right {
        border-left: none;
        border-top: 1px solid var(--parchment);
        padding: 40px 24px 56px;
        justify-content: flex-start;
      }
      .product-panel { max-width: 100%; }
      .product-name { font-size: 2rem; }

      .footer { padding: 24px 20px; flex-direction: column; text-align: center; gap: 8px; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="/" class="nav-logo">madey</a>
    <ul class="nav-links">
      <li><a href="/gallery" class="active">gallery</a></li>
      <li><a href="/about">about</a></li>
      <li><a href="/#contact">contact</a></li>
      <li><a href="https://www.instagram.com/madeydesign" target="_blank" rel="noopener">instagram ↗</a></li>
    </ul>
    <button class="nav-hamburger" aria-label="Menu"><span></span><span></span></button>
  </nav>

  <div class="mobile-menu" id="mobileMenu" hidden>
    <button class="mobile-menu-close" id="mobileClose">✕</button>
    <ul>
      <li><a href="/gallery">gallery</a></li>
      <li><a href="/about">about</a></li>
      <li><a href="/#contact">contact</a></li>
      <li><a href="https://www.instagram.com/madeydesign" target="_blank" rel="noopener">instagram ↗</a></li>
    </ul>
  </div>

  <section class="product-detail" id="productDetail">
    <div class="product-left">
      <img id="productImg" src="" alt="" />
    </div>
    <div class="product-right">
      <div class="product-panel">
        <span id="productCategory" class="product-category"></span>
        <h1 id="productName" class="product-name"></h1>
        <span class="product-sold-badge">Sold</span>
        <p id="productDesc" class="product-desc"></p>
        <div class="product-divider"></div>
        <a href="/#contact" class="inquire-link">inquire about something similar →</a>
        <a href="/gallery" class="back-link">← back to gallery</a>
      </div>
    </div>
  </section>

  <footer class="footer">
    <span class="logo">madey</span>
    <p>© 2026 Madey Design</p>
    <a href="https://www.instagram.com/madeydesign" target="_blank" rel="noopener">@madeydesign</a>
  </footer>

  <script>
    const products = {
      'bowl': {
        name: 'Maple & Walnut Statement Bowl',
        category: 'Turned Wood',
        image: '/images/product-bowl.jpg',
        description: 'Hand-turned from solid maple and walnut. The wavy inlay is carved, not glued — each one unrepeatable. Food-safe oil finish. Approximately 10–12" diameter.'
      },
      'bubble-bowl': {
        name: 'Bubble Bowl',
        category: 'Turned Wood',
        image: '/images/product-bubble-bowl.jpg',
        wb: true,
        description: 'A sculptural bowl with a rounded, organic form. Turned from walnut and maple, finished with food-safe oil. The shape is meant to sit naturally in the hand.'
      },
      'bubble-stack': {
        name: 'Bubble Bowl — Stacked',
        category: 'Turned Wood',
        image: '/images/product-bubble-stack.jpg',
        wb: true,
        description: 'Three bubble bowls stacked into a single sculptural object. Each bowl is individually turned, then nested together. Works as a display piece or separated for use.'
      },
      'paddle-board': {
        name: 'Paddle Board',
        category: 'Functional Wood',
        image: '/images/product-paddle-board.jpg',
        wb: true,
        description: 'A walnut and maple serving board with a paddle handle. Hand-shaped and finished with food-safe oil. Makes a beautiful everyday object.'
      },
      'wave-board': {
        name: 'Wave Board',
        category: 'Functional Wood',
        image: '/images/product-wave-board.jpg',
        wb: true,
        description: 'A large serving board with a flowing wave inlay in contrasting walnut and maple. The inlay is carved by hand — no two are identical. Food-safe finish.'
      },
      'side-table': {
        name: 'Stacked Side Table',
        category: 'Furniture',
        image: '/images/product-totem.jpg',
        description: 'Turned from multiple wood species — each layer shaped separately, then stacked and balanced. Functions as a side table or display pedestal.'
      },
      'candle-holders': {
        name: 'Candle Holders',
        category: 'Turned Wood',
        image: '/images/product-bud-vase.jpg',
        description: 'A set of turned candle holders in varying heights. Each one is shaped individually on the lathe from walnut and maple scraps.'
      },
      'bud-vases': {
        name: 'Bud Vases',
        category: 'Turned Wood',
        image: '/images/bud-vases-collection.jpg',
        description: 'A collection of small bud vases, each turned from scrap wood. No two share the same proportions. Meant to be grouped together or displayed alone.'
      }
    };

    (function () {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const product = id && products[id];

      if (!product) {
        window.location.replace('/shop');
        return;
      }

      // Set page title
      document.title = product.name + ' — Madey Design';

      // Populate fields
      document.getElementById('productCategory').textContent = product.category;
      document.getElementById('productName').textContent = product.name;
      document.getElementById('productDesc').textContent = product.description;

      const img = document.getElementById('productImg');
      img.src = product.image;
      img.alt = product.name;
      if (product.wb) {
        img.style.filter = 'sepia(0.06) saturate(1.1) hue-rotate(-6deg) brightness(1.02)';
      }
    })();

    // Mobile menu
    const hamburger = document.querySelector('.nav-hamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    document.getElementById('mobileClose').addEventListener('click', () => mobileMenu.hidden = true);
    hamburger.addEventListener('click', () => mobileMenu.hidden = false);
    mobileMenu.querySelectorAll('a').forEach(a => a.addEventListener('click', () => mobileMenu.hidden = true));
  </script>
</body>
</html>
